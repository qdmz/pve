<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE 虚拟机管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="app" class="container mt-5">
        <div v-if="loading" class="text-center">
            <div class="spinner-border" role="status"></div>
            <p>加载中...</p>
        </div>
        
        <!-- 登录表单 -->
        <div v-else-if="!user" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>登录</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" v-model="loginForm.email" class="form-control" placeholder="请输入邮箱">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" v-model="loginForm.password" class="form-control" placeholder="请输入密码">
                        </div>
                        <button @click="login" class="btn btn-primary w-100" :disabled="logining">
                            {{ logining ? '登录中...' : '登录' }}
                        </button>
                        <div v-if="error" class="alert alert-danger mt-3">{{ error }}</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 仪表板 -->
        <div v-else>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">PVE 管理系统</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item">
                                <a class="nav-link" href="#" @click="currentView = 'dashboard'">仪表板</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" @click="currentView = 'vms'" v-if="user.role === 'admin'">虚拟机管理</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" @click="currentView = 'myvms'" v-else>我的虚拟机</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" @click="currentView = 'products'" v-if="user.role !== 'admin'">产品购买</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" @click="currentView = 'admin'" v-if="user.role === 'admin'">管理后台</a>
                            </li>
                        </ul>
                        <div class="d-flex align-items-center">
                            <span class="text-white me-3">欢迎, {{ user.username }}</span>
                            <button @click="logout" class="btn btn-outline-light btn-sm">退出</button>
                        </div>
                    </div>
                </div>
            </nav>
            
            <!-- 内容区域 -->
            <div v-if="currentView === 'dashboard'">
                <h2>仪表板</h2>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">系统状态</h5>
                        <p class="card-text">欢迎使用 PVE 虚拟机管理系统</p>
                    </div>
                </div>
            </div>
            
            <div v-else-if="currentView === 'vms'">
                <h2>虚拟机管理</h2>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">虚拟机列表</h5>
                        <p class="card-text">这里显示所有虚拟机</p>
                    </div>
                </div>
            </div>
            
            <div v-else-if="currentView === 'myvms'">
                <h2>我的虚拟机</h2>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">我的虚拟机列表</h5>
                        <p class="card-text">这里显示您的虚拟机</p>
                    </div>
                </div>
            </div>
            
            <div v-else-if="currentView === 'products'">
                <h2>产品购买</h2>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">产品列表</h5>
                        <p class="card-text">这里显示可用的产品</p>
                    </div>
                </div>
            </div>
            
            <div v-else-if="currentView === 'admin'">
                <h2>管理后台</h2>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">管理员功能</h5>
                        <p class="card-text">这里是管理员功能</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 简单的错误处理
        window.onerror = function(msg, url, line, col, error) {
            console.error('JavaScript error:', msg, 'at', url, 'line', line);
            document.body.innerHTML = '<div class="container mt-5"><div class="alert alert-danger">JavaScript 错误: ' + msg + '</div></div>';
            return true;
        };

        // 使用更简单的方式创建应用
        try {
            const { createApp } = Vue;
            
            createApp({
                data() {
                    return {
                        loading: true,
                        user: null,
                        balance: 0,
                        currentView: 'dashboard',
                        loginForm: { email: '', password: '' },
                        logining: false,
                        error: null
                    };
                },
                mounted() {
                    this.checkLogin();
                },
                methods: {
                    checkLogin() {
                        axios.get('/api/user/info')
                            .then(response => {
                                if (response.data.success) {
                                    this.user = response.data.user;
                                    this.balance = response.data.balance;
                                } else {
                                    this.user = null;
                                }
                            })
                            .catch(error => {
                                console.error('Login check error:', error);
                                this.user = null;
                            })
                            .finally(() => {
                                this.loading = false;
                            });
                    },
                    login() {
                        this.logining = true;
                        this.error = null;
                        
                        axios.post('/api/login', this.loginForm)
                            .then(response => {
                                if (response.data.success) {
                                    this.user = response.data.user;
                                } else {
                                    this.error = response.data.message;
                                }
                            })
                            .catch(error => {
                                console.error('Login error:', error);
                                this.error = '登录失败，请检查网络连接';
                            })
                            .finally(() => {
                                this.logining = false;
                            });
                    },
                    logout() {
                        axios.post('/api/logout')
                            .then(() => {
                                this.user = null;
                            })
                            .catch(error => {
                                console.error('Logout error:', error);
                            });
                    }
                }
            }).mount('#app');
        } catch (e) {
            console.error('App initialization error:', e);
            document.body.innerHTML = '<div class="container mt-5"><div class="alert alert-danger">应用初始化失败: ' + e.message + '</div></div>';
        }
    </script>
</body>
</html>
