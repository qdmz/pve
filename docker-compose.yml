version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pve-manager-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
      - ./docker/php-fpm-logging.conf:/usr/local/etc/php-fpm.d/logging.conf:ro
    networks:
      - pve-network
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_NAME=pve_manager
      - DB_USER=root
      - DB_PASSWORD=rootpass123
      - PHP_DISPLAY_ERRORS=0
      - APP_DEBUG=false
      - LOG_LEVEL=info
      - SESSION_LIFETIME=86400
      - CSRF_TOKEN_LIFETIME=3600
      - RATE_LIMIT_MAX_REQUESTS=60
      - RATE_LIMIT_TIME_WINDOW=60
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck", "-t", "30"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.25-alpine
    container_name: pve-manager-nginx
    restart: unless-stopped
    ports:
      - "81:80"
      - "444:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - pve-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: mysql:5.7
    container_name: pve-manager-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: pve_manager
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - pve-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: pve-manager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pve-network
    command: redis-server --appendonly yes --requirepass "redis_password_123"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  pve-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local